<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 168 52" width="168" height="52" role="img" aria-label="Enso logo">
  <defs>

    <linearGradient id="mg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B5BD6"/>
      <stop offset="100%" stop-color="#9B8CF5"/>
    </linearGradient>

    <style>
      @font-face {
        font-family: 'Onest';
        src: url('../assets/Fonts/Onest/Onest-VariableFont_wght.ttf') format('truetype');
        font-weight: 100 900;
        font-display: block;
      }

      .v1-word { fill: #FFFFFF; }
      .v1-dot  { fill: #9B8CF5; }

      @media (prefers-color-scheme: light) {
        .v1-word { fill: #09090F; }
        .v1-dot  { fill: #5B5BD6; }
      }
    </style>
  </defs>

  <!--
    Ensō circle mark
    Center (26,26) · Radius 18
    pathLength="360" lets us specify dasharray in degrees
    stroke-dasharray="305 55" → 305° arc, 55° gap
    rotate(-30) positions the gap at ~1 o'clock (upper-right)
  -->
  <circle
    cx="26" cy="26" r="18"
    fill="none"
    stroke="url(#mg1)"
    stroke-width="3.5"
    stroke-linecap="round"
    pathLength="360"
    stroke-dasharray="305 55"
    transform="rotate(-30 26 26)"
  />

  <!--
    Arc terminus dot — calligraphic end of stroke.
    Arc ends at screen angle 275° → (27.57, 8.07)
    A small filled circle anchors the stroke end visually.
  -->
  <circle class="v1-dot" cx="27.6" cy="8.1" r="2.2"/>

  <!-- Wordmark -->
  <text
    x="58" y="35"
    class="v1-word"
    font-family="'Onest', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="28"
    font-weight="650"
    letter-spacing="-0.6"
  >enso</text>

</svg>
